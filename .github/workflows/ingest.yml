name: Spotify Ingestion Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'   # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install spotipy psycopg2-binary python-dotenv pandas sqlalchemy

      # Reconstruye el .cache de Spotify desde el secret
      - name: Restore Spotify token cache
        run: echo '${{ secrets.SPOTIFY_CACHE }}' > .cache

      # ── Pipeline completo ─────────────────────────────────────────────────
      # Corre los 6 pasos: ingesta (3) + transformacion (3)
      - name: Run full pipeline
        env:
          SPOTIFY_CLIENT_ID:     ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REDIRECT_URI:  ${{ secrets.SPOTIFY_REDIRECT_URI }}
          SUPABASE_DB_PASSWORD:  ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python scripts/run_pipeline.py

      - name: Summary
        if: always()
        run: echo "Pipeline completado en $(date -u '+%Y-%m-%d %H:%M UTC')"
