name: Spotify Ingestion Pipeline

# Cuando corre:
# 1. Automaticamente cada 6 horas (cron)
# 2. Manualmente desde GitHub Actions tab (workflow_dispatch)
on:
  schedule:
    - cron: '0 */6 * * *'   # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # Solo las librerias que necesita la ingesta
      - name: Install dependencies
        run: pip install spotipy psycopg2-binary python-dotenv

      # Reconstruye el .cache de Spotify desde el secret
      # spotipy usa el refresh_token para renovar el access_token sin navegador
      - name: Restore Spotify token cache
        run: echo '${{ secrets.SPOTIFY_CACHE }}' > .cache

      # ── Paso 1: Plays ─────────────────────────────────────────────────────
      # Trae los ultimos 50 tracks reproducidos y hace upsert en raw_plays
      - name: Run plays ingestion
        env:
          SPOTIFY_CLIENT_ID:     ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REDIRECT_URI:  ${{ secrets.SPOTIFY_REDIRECT_URI }}
          SUPABASE_DB_PASSWORD:  ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python ingestion/ingest_plays.py

      # ── Paso 2: Audio Features ────────────────────────────────────────────
      # Enriquece los tracks nuevos con BPM, energy, valence, etc.
      # Si el endpoint retorna 403 (restringido), guarda NULLs y sigue
      - name: Run audio features ingestion
        env:
          SPOTIFY_CLIENT_ID:     ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REDIRECT_URI:  ${{ secrets.SPOTIFY_REDIRECT_URI }}
          SUPABASE_DB_PASSWORD:  ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python ingestion/ingest_audio_features.py

      # ── Paso 3: Artistas ──────────────────────────────────────────────────
      # Trae nombre y generos de artistas nuevos
      # Si el endpoint retorna 403, usa el nombre ya guardado en raw_plays
      - name: Run artists ingestion
        env:
          SPOTIFY_CLIENT_ID:     ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REDIRECT_URI:  ${{ secrets.SPOTIFY_REDIRECT_URI }}
          SUPABASE_DB_PASSWORD:  ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python ingestion/ingest_artists.py

      - name: Summary
        if: always()
        run: echo "Pipeline completado en $(date -u '+%Y-%m-%d %H:%M UTC')"
