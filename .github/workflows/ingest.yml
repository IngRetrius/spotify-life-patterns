name: Spotify Ingestion Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'   # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install spotipy psycopg2-binary python-dotenv pandas sqlalchemy pytest

      # Transformation-layer tests. They use hand-built pandas DataFrames
      # and do not touch the database, so they can run before we spend a
      # Spotify API call. If the business logic is broken, fail fast here
      # instead of silently writing bad labels to Supabase.
      - name: Run pipeline tests
        run: python -m pytest tests/ -v

      # Rebuilds the Spotify .cache from the repo secret
      - name: Restore Spotify token cache
        run: echo '${{ secrets.SPOTIFY_CACHE }}' > .cache

      # ── Full pipeline ────────────────────────────────────────────────
      # Runs the 6 steps: ingestion (3) + transformation (3).
      # run_pipeline.py queries Supabase for row counts before and after
      # each step and appends a markdown table to $GITHUB_STEP_SUMMARY,
      # so the results are visible on the Actions run page without
      # opening the logs. It also emits a ::warning:: annotation if
      # step 1 ingested 0 new plays.
      - name: Run full pipeline
        env:
          SPOTIFY_CLIENT_ID:     ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REDIRECT_URI:  ${{ secrets.SPOTIFY_REDIRECT_URI }}
          SUPABASE_DB_PASSWORD:  ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python scripts/run_pipeline.py

      # Fallback note — only fires if the pipeline step was skipped
      # (e.g. cancellation before it could run). The pipeline itself
      # handles the success/failure summary via GITHUB_STEP_SUMMARY.
      - name: Workflow completion timestamp
        if: always()
        run: echo "Workflow finished at $(date -u '+%Y-%m-%d %H:%M UTC')"
